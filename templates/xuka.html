<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Video YouTube</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">

  <div class="max-w-4xl mx-auto p-4 space-y-6">

    <!-- Video 1 - tăng chiều cao thủ công -->
    <div class="w-full h-[400px]">
      <iframe class="w-full h-full rounded-xl shadow-lg"
        src="https://www.youtube.com/embed/FxIGbF24gkU"
        title="Video 1"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen></iframe>
    </div>

    <!-- Video 2 - dọc, tăng chiều cao thủ công -->
    <div class="w-full h-[400px]">
      <iframe class="w-full h-full rounded-xl shadow-lg"
        src="https://www.youtube.com/embed/jqwQPZ2uNyc"
        title="AI Video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen></iframe>
    </div>

    <!-- Video 3 - tăng chiều cao thủ công -->
    <div class="w-full h-[400px]">
      <iframe class="w-full h-full rounded-xl shadow-lg"
        src="https://www.youtube.com/embed/l_4eslm2VEY"
        title="Bandicam Video"
        frameborder="0"
        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
        allowfullscreen></iframe>
    </div>

  </div>

</body>
</html>
